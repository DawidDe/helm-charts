apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-deployment"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app: "{{ .Release.Name }}"
    spec:
      securityContext:
        fsGroup: 82
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.overwriteRepository | default "ghcr.io/pelican-dev/panel" }}:{{ .Values.image.overwriteTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.overwriteImagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 80
          env:
            - name: APP_URL
              value: {{ .Values.general.domain | quote }}
            - name: LE_EMAIL
              value: {{ .Values.general.email | quote }}
            - name: BEHIND_PROXY
              value: {{ .Values.general.behindProxy | quote }}
            - name: TRUSTED_PROXIES
              value: {{ .Values.general.trustedProxies | quote }}
          volumeMounts:
            - name: data
              mountPath: /pelican-data
            - name: logs
              mountPath: /var/www/html/storage/logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-data"
        - name: logs
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-logs"