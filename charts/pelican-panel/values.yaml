# Default values for the Pelican Panel Helm Chart
# Leave settings you are unsure about as-is. All required changes are documented.

general:
  # Domain for your Pelican Panel instance.
  domain: "https://pelican.domain.com"
  # Email used by Caddy for SSL certificate issuance via Let's Encrypt.
  # Only set if Caddy handles SSL termination.
  email: "email"
  # Required when Caddy is running behind another proxy.
  behindProxy: "true"
  # IP address of the proxy that Caddy should trust.
  trustedProxies: "ip"

image:
  # Container image repository override. Default: ghcr.io/pelican-dev/panel
  overwriteRepository: ""
  # Container image tag override. Default: v1.0.0-beta29
  overwriteTag: ""
  # Image pull policy override. Default: IfNotPresent
  # Options: IfNotPresent / Always / Never
  overwriteImagePullPolicy: ""

service:
  # Kubernetes service type. Default: ClusterIP
  type: "ClusterIP"
  # Service port
  port: 80

# Persistent Volume Claims (PVCs). You must provide corresponding Persistent Volumes (PVs).
volumes:
  # Default storage class for PVCs
  sharedStorageClassName: "storageClassName"
  data:
    # PVC access mode
    accessMode: "ReadWriteOnce"
    # PVC size
    size: "1Gi"
    # Optional override for storage class. Uncomment to use.
    # overwriteStorageClassName: ""
  logs:
    # PVC access mode
    accessMode: "ReadWriteOnce"
    # PVC size
    size: "1Gi"
    # Optional override for storage class. Uncomment to use.
    # overwriteStorageClassName: ""